<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tools Verzeichnis & Kostenrechner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #18181f;
      --bg3: #22222d;
      --border: #2e2e3d;
      --accent: #7c6df7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #888899;
      --green: #34d399;
      --card-hover: #1e1e2a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent2); }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.15rem; }

    /* ── LAYOUT ── */
    .wrapper {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
    }
    @media (max-width: 900px) {
      .wrapper { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .filter-bar input[type="text"] {
      flex: 1;
      min-width: 200px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-bar input[type="text"]:focus { border-color: var(--accent); }
    .filter-bar input[type="text"]::placeholder { color: var(--muted); }

    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .tab {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.35rem 0.85rem;
      transition: all 0.15s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .tab .count {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      font-size: 0.7rem;
      padding: 0 0.4rem;
    }
    .tab:not(.active) .count {
      background: var(--bg3);
      color: var(--muted);
    }

    /* ── TOOL GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      padding-right: 1.5rem;
    }
    @media (max-width: 900px) { .grid { padding-right: 0; } }

    .card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      padding: 1rem;
      position: relative;
      transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,247,0.12);
      transform: translateY(-2px);
    }
    .card.selected {
      border-color: var(--accent);
      background: linear-gradient(135deg, #18182a 0%, #1a1830 100%);
      box-shadow: 0 0 0 3px rgba(124,109,247,0.25);
    }
    .card.hidden { display: none; }

    .card-check {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      background: var(--bg3);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card.selected .card-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .card.selected .card-check::after {
      content: '';
      width: 10px;
      height: 6px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
      display: block;
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }
    .card-cat {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .card-desc {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }
    .card-price {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--green);
    }
    .card-price small {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .card-plan {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── CATEGORY COLORS ── */
    .cat-video   { background: rgba(239,68,68,0.15);  color: #f87171; }
    .cat-audio   { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .cat-musik   { background: rgba(236,72,153,0.15); color: #f472b6; }
    .cat-bild    { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .cat-text    { background: rgba(124,109,247,0.15);color: #a78bfa; }
    .cat-code    { background: rgba(52,211,153,0.15); color: #34d399; }
    .cat-prod    { background: rgba(251,146,60,0.15); color: #fb923c; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 1.5rem;
      align-self: start;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      max-height: calc(100vh - 3rem);
      overflow-y: auto;
    }
    .sidebar h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .sidebar-subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 1.25rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    /* category group in sidebar */
    .sb-group { margin-bottom: 1rem; }
    .sb-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .sb-group-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sb-group-total {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
    }

    .sb-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      background: var(--bg3);
      margin-bottom: 0.3rem;
      gap: 0.5rem;
    }
    .sb-item-name {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      flex: 1;
      min-width: 0;
    }
    .sb-item-icon { font-size: 1rem; flex-shrink: 0; }
    .sb-item-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-item-price {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sb-item-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.1rem;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .sb-item-remove:hover { color: #f87171; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    .totals { display: grid; gap: 0.6rem; }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .total-row .label { color: var(--muted); font-size: 0.82rem; }
    .total-row .value { font-size: 0.9rem; font-weight: 600; }
    .total-row.main .label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .total-row.main .value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent2);
    }
    .total-row.annual .value { color: var(--muted); }

    .btn-clear {
      width: 100%;
      margin-top: 1rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0.55rem;
      transition: all 0.15s;
    }
    .btn-clear:hover { border-color: #f87171; color: #f87171; }

    .savings-note {
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 8px;
      color: var(--green);
      font-size: 0.75rem;
      margin-top: 0.75rem;
      padding: 0.6rem 0.75rem;
      text-align: center;
    }

    /* ── AFFILIATE LINK ON CARD ── */
    .card-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }
    .card-link:hover { color: #fff; text-decoration: underline; }

    /* ── LINK IN SIDEBAR ITEM ── */
    .sb-item-link {
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .sb-item-link:hover { color: var(--accent2); text-decoration: underline; }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      padding: 3rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>AI Tools <span>Verzeichnis</span> & Kostenrechner</h1>
    <p>Wähle deine KI-Tools aus, kategorisiere sie und berechne deine monatlichen Kosten</p>
  </div>
</header>

<div class="wrapper">
  <!-- LEFT: tools -->
  <div>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="🔍  Tools suchen..." oninput="render()" />
    </div>
    <div class="cat-tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- RIGHT: calculator sidebar -->
  <aside class="sidebar">
    <h2>Mein KI-Stack</h2>
    <p class="sidebar-subtitle">Ausgewählte Tools & Kosten</p>
    <div id="sb-content">
      <div class="empty-state">
        <div class="icon">🛒</div>
        <p>Noch keine Tools ausgewählt.<br/>Klicke auf eine Karte um sie hinzuzufügen.</p>
      </div>
    </div>
  </aside>
</div>

<script>
// ─────────────────────────────────────────
//  TOOL DATA
// ─────────────────────────────────────────
const TOOLS = [

  { id:'heygen',     name:'HeyGen',          icon:'🧑‍💼', cat:'Video',   price:29,   plan:'Creator',         url:'https://heygen.com',            desc:'KI-Avatar-Videos & Talking-Head-Clips. Perfekt für Marketing-Videos.' },
  { id:'luma',       name:'Luma Dream Machine',icon:'✨',cat:'Video',   price:30,   plan:'Standard',        url:'https://lumalabs.ai',           desc:'Hochwertige 3D-Video- und Szenengenierung von Luma AI.' },

  // ── AUDIO ───────────────────────────────
  { id:'eleven',     name:'ElevenLabs',      icon:'🎙️', cat:'Audio',   price:22,   plan:'Creator',         url:'https://elevenlabs.io',         desc:'Realistischste KI-Stimmen am Markt. Voice Cloning & Synchronisation.' },
  { id:'descript',   name:'Descript',        icon:'🎚️', cat:'Audio',   price:12,   plan:'Creator',         url:'https://descript.com',          desc:'Audio-/Video-Editing via Texttranskript. Overdub zum Stimmen-Editing.' },
  { id:'adobe-pod',  name:'Adobe Podcast',   icon:'🎧', cat:'Audio',   price:10,   plan:'Enhance',         url:'https://podcast.adobe.com',     desc:'KI-gestützte Audiobereinigung & Podcastproduktion von Adobe.' },
  { id:'whisper',    name:'AssemblyAI',       icon:'🔊', cat:'Audio',   price:15,   plan:'Starter',         url:'https://assemblyai.com',        desc:'Präzise Transkription, Sentimentanalyse und Speaker-Detektion per API.' },

  // ── MUSIK ───────────────────────────────
  { id:'suno',       name:'Suno',            icon:'🎵', cat:'Musik',    price:10,   plan:'Pro',             url:'https://suno.com',              desc:'Vollständige Songs aus Text-Prompts generieren – Vocals, Instrumente & Mix.' },
  { id:'udio',       name:'Udio',            icon:'🎶', cat:'Musik',    price:10,   plan:'Standard',        url:'https://udio.com',              desc:'Hochwertige Musikgenerierung mit präziser Genre- und Stilkontrolle.' },
  { id:'mubert',     name:'Mubert',          icon:'🎸', cat:'Musik',    price:14,   plan:'Ambassador',      url:'https://mubert.com',            desc:'Lizenzfreie KI-Musik für Content Creator – endlose generative Tracks.' },

  // ── BILD ────────────────────────────────
  { id:'midjourney', name:'Midjourney',      icon:'🖼️', cat:'Bild',    price:30,   plan:'Standard',        url:'https://midjourney.com',        desc:'Industriestandard für KI-Bildgenerierung. Unübertroffene Bildqualität & Stil.' },
  { id:'firefly',    name:'Adobe Firefly',   icon:'🔥', cat:'Bild',    price:5,    plan:'Starter',         url:'https://firefly.adobe.com',     desc:'Kommerziell safe Bildgenerierung von Adobe. Direkt in Creative Cloud integriert.' },
  { id:'leonardo',   name:'Leonardo AI',     icon:'🎨', cat:'Bild',    price:12,   plan:'Apprentice',      url:'https://leonardo.ai',           desc:'Feinabstimmbare Bildgenerierung mit eigenen Models & LoRA-Training.' },
  { id:'ideogram',   name:'Ideogram',        icon:'💬', cat:'Bild',    price:20,   plan:'Pro',             url:'https://ideogram.ai',           desc:'Beste Textwiedergabe in KI-Bildern. Ideal für Logos und Grafiken.' },
  { id:'dalle',      name:'DALL-E 3',        icon:'🌈', cat:'Bild',    price:20,   plan:'ChatGPT Plus',    url:'https://openai.com/chatgpt',    desc:'OpenAIs DALL-E 3 direkt in ChatGPT. Hochwertige Bilder via natürlicher Sprache.' },

  // ── TEXT / KI-CHAT ─────────────────────
  { id:'chatgpt',    name:'ChatGPT Plus',    icon:'🤖', cat:'Text',     price:20,   plan:'Plus',            url:'https://chat.openai.com',       desc:'GPT-4o + o1, Bildgenerierung (DALL-E), Websuche & Dateianalyse von OpenAI.' },
  { id:'claude',     name:'Claude Pro',      icon:'🧠', cat:'Text',     price:20,   plan:'Pro',             url:'https://claude.ai',             desc:'Anthropics Claude – beste Texterstellung, langer Kontext bis 200K Token.' },
  { id:'gemini',     name:'Gemini Advanced', icon:'💎', cat:'Text',     price:20,   plan:'Advanced',        url:'https://gemini.google.com',     desc:'Googles Gemini Ultra mit tiefer Google-Workspace-Integration.' },
  { id:'perplexity', name:'Perplexity Pro',  icon:'🔍', cat:'Text',     price:20,   plan:'Pro',             url:'https://perplexity.ai',         desc:'KI-Suchmaschine mit Quellenangaben. Bester Ersatz für klassische Websuche.' },
  { id:'jasper',     name:'Jasper AI',       icon:'✍️', cat:'Text',    price:49,   plan:'Creator',         url:'https://jasper.ai',             desc:'Marketing-fokussierter KI-Schreibassistent mit Brand-Voice-Training.' },

  // ── CODE ────────────────────────────────
  { id:'copilot',    name:'GitHub Copilot',  icon:'👾', cat:'Code',     price:10,   plan:'Individual',      url:'https://github.com/features/copilot', desc:'KI-Pair-Programmer direkt im Editor. Kontextbezogene Code-Vervollständigung.' },
  { id:'cursor',     name:'Cursor',          icon:'⌨️', cat:'Code',    price:20,   plan:'Pro',             url:'https://cursor.com',            desc:'KI-nativer Code-Editor mit Codebase-Verständnis. Beste Coding-AI 2026.' },
  { id:'tabnine',    name:'Tabnine',         icon:'🔮', cat:'Code',     price:12,   plan:'Pro',             url:'https://tabnine.com',           desc:'Privacy-fokussierter KI-Codeassistent mit on-premise Option.' },
  { id:'replit',     name:'Replit AI',       icon:'🔄', cat:'Code',     price:20,   plan:'Core',            url:'https://replit.com',            desc:'Browser-basierter Coding-Workspace mit KI-Assistent und Deployment.' },

  // ── PRODUKTIVITÄT ───────────────────────
  { id:'notion-ai',  name:'Notion AI',       icon:'📝', cat:'Produktivität', price:10, plan:'Add-on',       url:'https://notion.so/product/ai',  desc:'KI direkt im Notion-Workspace: Zusammenfassen, Schreiben, Übersetzen.' },
  { id:'gamma',      name:'Gamma',           icon:'📊', cat:'Produktivität', price:10, plan:'Plus',         url:'https://gamma.app',             desc:'KI-gestützte Präsentationen & Webpages. Fertige Slides in Sekunden.' },
  { id:'otter',      name:'Otter.ai',        icon:'🦦', cat:'Produktivität', price:17, plan:'Pro',          url:'https://otter.ai',              desc:'Automatische Meeting-Transkription & KI-Zusammenfassungen.' },
  { id:'zapier-ai',  name:'Zapier AI',       icon:'⚡', cat:'Produktivität', price:20, plan:'Starter',      url:'https://zapier.com',            desc:'KI-gestützte Automationen zwischen 6000+ Apps ohne Coding.' },
];

const CAT_ICONS = {
  'Alle':'🌐','Video':'🎬','Audio':'🎙️','Musik':'🎵',
  'Bild':'🖼️','Text':'💬','Code':'💻','Produktivität':'⚡'
};
const CAT_CLASS = {
  'Video':'cat-video','Audio':'cat-audio','Musik':'cat-musik',
  'Bild':'cat-bild','Text':'cat-text','Code':'cat-code','Produktivität':'cat-prod'
};

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
const fmt = n => n.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let activeCategory = 'Alle';
let selected = new Set();

// ─────────────────────────────────────────
//  RENDER TABS
// ─────────────────────────────────────────
function renderTabs() {
  const cats = ['Alle', ...new Set(TOOLS.map(t => t.cat))];
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = cats.map(cat => {
    const count = cat === 'Alle' ? TOOLS.length : TOOLS.filter(t => t.cat === cat).length;
    return `<button class="tab ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">
      ${CAT_ICONS[cat] || '🔧'} ${cat}
      <span class="count">${count}</span>
    </button>`;
  }).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  render();
}

// ─────────────────────────────────────────
//  RENDER GRID
// ─────────────────────────────────────────
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');

  const visible = TOOLS.filter(t => {
    const matchCat = activeCategory === 'Alle' || t.cat === activeCategory;
    const matchQ   = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!visible.length) {
    grid.innerHTML = `<div class="no-results">😶 Keine Tools für diese Suche gefunden.</div>`;
    return;
  }

  grid.innerHTML = visible.map(t => `
    <div class="card ${selected.has(t.id) ? 'selected' : ''}" id="card-${t.id}" onclick="toggle('${t.id}')">
      <div class="card-check"></div>
      <span class="card-icon">${t.icon}</span>
      <div class="card-name">${t.name}</div>
      <span class="card-cat ${CAT_CLASS[t.cat] || ''}">${CAT_ICONS[t.cat] || ''} ${t.cat}</span>
      <p class="card-desc">${t.desc}</p>
      <div class="card-price">${t.price === 0 ? 'Kostenlos' : `€ ${fmt(t.price)}`}<small>${t.price > 0 ? ' /Mo.' : ''}</small></div>
      <div class="card-plan">${t.plan}</div>
      <a class="card-link" href="${t.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Jetzt testen →</a>
    </div>
  `).join('');
}

// ─────────────────────────────────────────
//  TOGGLE SELECTION
// ─────────────────────────────────────────
function toggle(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  render();
  renderSidebar();
}

function remove(id) {
  selected.delete(id);
  render();
  renderSidebar();
}

function clearAll() {
  selected.clear();
  render();
  renderSidebar();
}

// ─────────────────────────────────────────
//  RENDER SIDEBAR
// ─────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sb-content');
  const picks = TOOLS.filter(t => selected.has(t.id));

  if (!picks.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><p>Noch keine Tools ausgewählt.<br/>Klicke auf eine Karte um sie hinzuzufügen.</p></div>`;
    return;
  }

  // group by category
  const groups = {};
  picks.forEach(t => {
    if (!groups[t.cat]) groups[t.cat] = [];
    groups[t.cat].push(t);
  });

  const totalMonthly = picks.reduce((s, t) => s + t.price, 0);
  const totalAnnual  = totalMonthly * 12;

  let html = '';

  for (const [cat, items] of Object.entries(groups)) {
    const catTotal = items.reduce((s, t) => s + t.price, 0);
    html += `
      <div class="sb-group">
        <div class="sb-group-header">
          <span class="sb-group-label">${CAT_ICONS[cat] || '🔧'} ${cat}</span>
          <span class="sb-group-total">€ ${fmt(catTotal)}/Mo.</span>
        </div>
        ${items.map(t => `
          <div class="sb-item">
            <div class="sb-item-name">
              <span class="sb-item-icon">${t.icon}</span>
              <a class="sb-item-label sb-item-link" href="${t.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="${t.name} öffnen">${t.name}</a>
            </div>
            <span class="sb-item-price">€ ${fmt(t.price)}</span>
            <button class="sb-item-remove" onclick="event.stopPropagation(); remove('${t.id}')" title="Entfernen">✕</button>
          </div>
        `).join('')}
      </div>
    `;
  }

  html += `
    <hr class="divider"/>
    <div class="totals">
      <div class="total-row">
        <span class="label">Anzahl Tools</span>
        <span class="value">${picks.length}</span>
      </div>
      <div class="total-row">
        <span class="label">Kategorien</span>
        <span class="value">${Object.keys(groups).length}</span>
      </div>
      <hr class="divider" style="margin:0.25rem 0"/>
      <div class="total-row main">
        <span class="label">Gesamt / Monat</span>
        <span class="value">€ ${fmt(totalMonthly)}</span>
      </div>
      <div class="total-row annual">
        <span class="label">Gesamt / Jahr</span>
        <span class="value">€ ${fmt(totalAnnual)}</span>
      </div>
    </div>
    ${totalMonthly > 0 ? `<div class="savings-note">💡 Mit Jahresabo sparst du ca. <strong>€ ${fmt(Math.round(totalMonthly * 12 * 0.17))}</strong>/Jahr (ø 17% Rabatt)</div>` : ''}
    <button class="btn-clear" onclick="clearAll()">🗑 Auswahl zurücksetzen</button>
  `;

  el.innerHTML = html;
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
renderTabs();
render();
renderSidebar();
</script>
</body>
</html>
